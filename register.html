<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — VercelVirgo</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module">import { initTheme } from "./js/theme.js"; initTheme();</script>
</head>
<body>
  <div class="vv-bg"><div class="vv-bg-mesh"></div><div class="vv-bg-grid"></div></div>
  
  

  <div class="auth-page">
    <div class="auth-card animate-up">
      <div class="auth-logo">⬡ VercelVirgo</div>
      <h2 class="auth-title">Create Your Account</h2>
      <p class="auth-sub">Join the network and start earning coins</p>

      <!-- Referral Notice -->
      <div id="ref-notice" class="alert alert-info hidden" style="margin-bottom:20px">
        <span>🔗</span>
        <span>You were referred by: <strong id="ref-name">—</strong></span>
      </div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <div class="input-group">
            <span class="input-icon">👤</span>
            <input type="text" id="fullName" class="form-input" placeholder="Your full name" autocomplete="name" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-group">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <div class="input-group">
            <span class="input-icon">📱</span>
            <input type="tel" id="phone" class="form-input" placeholder="+1234567890" autocomplete="tel" />
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" class="form-input" placeholder="Min 8 chars" autocomplete="new-password" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm Password</label>
            <div class="input-group">
              <span class="input-icon">🔒</span>
              <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat password" autocomplete="new-password" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="referralCode">Referral Code <span style="color:var(--text-muted)">(Optional)</span></label>
          <div class="input-group">
            <span class="input-icon">🔗</span>
            <input type="text" id="referralCode" class="form-input" placeholder="e.g. ABC12345" maxlength="8" style="text-transform:uppercase" />
          </div>
          <span class="form-hint">Leave blank if you have no referral code</span>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
          🚀 Create Account
        </button>
      </form>

      <div class="auth-divider">or</div>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In →</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import {
      createUserWithEmailAndPassword
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import {
      doc, setDoc, getDoc, getDocs, collection,
      query, where, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import {
      showToast, showSpinner, hideSpinner, generateReferralCode,
      generateRandomCode, validateEmail, validatePassword,
      showFieldError, clearAllErrors, getUrlParam
    } from './js/utils.js';

    // ── Check if user already logged in
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    // ── Pre-fill referral code from URL
    const refCode = getUrlParam('ref');
    if (refCode) {
      document.getElementById('referralCode').value = refCode.toUpperCase();
      loadReferrerName(refCode.toUpperCase());
    }

    async function loadReferrerName(code) {
      try {
        const q = query(collection(db, 'users'), where('referralCode', '==', code));
        const snap = await getDocs(q);
        if (!snap.empty) {
          const name = snap.docs[0].data().fullName || 'A member';
          document.getElementById('ref-name').textContent = name;
          document.getElementById('ref-notice').classList.remove('hidden');
        }
      } catch (e) { /* silently ignore */ }
    }

    // ── Handle input autocapitalize on referralCode
    document.getElementById('referralCode').addEventListener('input', function() {
      this.value = this.value.toUpperCase();
    });

    // ── Register form submit
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      clearAllErrors(form);

      const fullName       = document.getElementById('fullName').value.trim();
      const email          = document.getElementById('email').value.trim();
      const phone          = document.getElementById('phone').value.trim();
      const password       = document.getElementById('password').value;
      const confirmPass    = document.getElementById('confirmPassword').value;
      const referralInput  = document.getElementById('referralCode').value.trim().toUpperCase();

      // Validate
      let valid = true;
      if (!fullName || fullName.length < 2) { showFieldError('fullName', 'Full name required (min 2 chars)'); valid = false; }
      if (!validateEmail(email)) { showFieldError('email', 'Enter a valid email address'); valid = false; }
      if (!phone || phone.length < 7) { showFieldError('phone', 'Enter a valid phone number'); valid = false; }
      const passErr = validatePassword(password);
      if (passErr) { showFieldError('password', passErr); valid = false; }
      if (password !== confirmPass) { showFieldError('confirmPassword', 'Passwords do not match'); valid = false; }
      if (!valid) return;

      showSpinner();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;

      try {
        // Resolve referral chain
        let referrerId = null;
        let referralChain = [];

        if (referralInput) {
          const q = query(collection(db, 'users'), where('referralCode', '==', referralInput));
          const snap = await getDocs(q);
          if (!snap.empty) {
            const referrer = snap.docs[0].data();
            referrerId     = referrer.uid;
            referralChain  = [...(referrer.referralChain || []), referrer.uid];
          } else {
            hideSpinner();
            btn.disabled = false;
            showFieldError('referralCode', 'Referral code not found');
            return;
          }
        }

        // Create Firebase Auth user
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const uid  = cred.user.uid;

        // Generate unique referral code
        let myCode = generateReferralCode(uid);
        // Ensure uniqueness — check if code exists
        const codeCheck = await getDocs(query(collection(db, 'users'), where('referralCode', '==', myCode)));
        if (!codeCheck.empty) myCode = generateRandomCode(8); // fallback random

        // Save user to Firestore
        await setDoc(doc(db, 'users', uid), {
          uid,
          fullName,
          email,
          phone,
          referralCode:  myCode,
          referredBy:    referrerId,
          referralChain: referralChain,
          coinBalance:   0,
          totalEarned:   0,
          totalWithdrawn:0,
          usdtAddress:   '',
          role:          'user',
          status:        'active',
          createdAt:     serverTimestamp()
        });

        hideSpinner();
        showToast('Account created successfully! Welcome to VercelVirgo 🎉', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

      } catch (err) {
        hideSpinner();
        btn.disabled = false;
        let msg = 'Registration failed. Please try again.';
        if (err.code === 'auth/email-already-in-use') msg = 'This email is already registered. Try logging in.';
        if (err.code === 'auth/invalid-email')        msg = 'Invalid email address.';
        if (err.code === 'auth/weak-password')        msg = 'Password is too weak.';
        showToast(msg, 'error');
      }
    });
  </script>
</body>
</html>
