<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sell Requests — Admin | VercelVirgo</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="vv-bg"><div class="vv-bg-mesh"></div><div class="vv-bg-grid"></div></div>
  
  <div class="app-layout">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <header class="main-header">
        <div style="display:flex;align-items:center;gap:16px">
          <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
          <div class="main-header-title">Sell-Back <span>Requests</span></div>
        </div>
        <div class="header-actions">
          <span id="pending-badge" class="badge badge-warning">0 pending</span>
        </div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <h2>🔽 Sell-Back Requests</h2>
          <p>Users want to sell their coins back to the platform</p>
        </div>

        <div class="alert alert-warning mb-24">
          ⚠️ <strong>Process:</strong> First send USDT to the user's wallet address, then click <strong>Approve</strong>. Coins will be deducted automatically.
        </div>

        <div class="filter-bar">
          <select id="status-filter" class="form-select" style="width:auto;min-width:160px">
            <option value="pending">⏳ Pending</option>
            <option value="completed">✅ Completed</option>
            <option value="rejected">❌ Rejected</option>
            <option value="">📋 All</option>
          </select>
          <button class="btn btn-secondary btn-sm" id="refresh-btn">🔄 Refresh</button>
        </div>

        <div class="card animate-up">
          <div class="table-wrap">
            <table class="table table-responsive">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Coins to Sell</th>
                  <th>USD Value</th>
                  <th>Send USDT to</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="sells-tbody">
                <tr><td colspan="7" style="text-align:center;padding:32px"><div class="spinner" style="margin:0 auto"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import {
      collection, query, where, orderBy, getDocs, doc, getDoc
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import {
      showToast, showSpinner, hideSpinner, initSidebar,
      formatCoins, formatUSD, formatDateTime, statusBadge,
      truncateAddress, showConfirm
    } from '../js/utils.js';
    import { getAdminSidebar } from '../js/admin-sidebar.js';
    import { approveSellBack, rejectTransaction } from '../js/coins.js';

    document.getElementById('sidebar-container').innerHTML = getAdminSidebar('sell');

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists() || snap.data().role !== 'admin') {
        await signOut(auth); window.location.href = 'index.html'; return;
      }
      const ud = snap.data();
      document.getElementById('admin-name').textContent   = ud.fullName || 'Admin';
      document.getElementById('admin-email').textContent  = ud.email || '';
      document.getElementById('admin-avatar').textContent = (ud.fullName||'A').charAt(0).toUpperCase();
      initSidebar();
      document.getElementById('admin-logout-btn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });
      await loadSells();
    });

    async function loadSells() {
      const status = document.getElementById('status-filter').value;
      const tbody  = document.getElementById('sells-tbody');
      try {
        let q;
        if (status) {
          q = query(collection(db,'coins_transactions'),
            where('type','==','sell'), where('status','==',status),
            orderBy('createdAt','desc'));
        } else {
          q = query(collection(db,'coins_transactions'),
            where('type','==','sell'), orderBy('createdAt','desc'));
        }
        const snap = await getDocs(q);
        const pending = snap.docs.filter(d => d.data().status === 'pending').length;
        document.getElementById('pending-badge').textContent = pending + ' pending';

        if (snap.empty) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:32px">No sell requests found</td></tr>';
          return;
        }

        tbody.innerHTML = snap.docs.map(d => {
          const t = d.data(); const id = d.id;
          const isPending = t.status === 'pending';
          return `<tr>
            <td data-label="User">
              <div style="font-weight:600">${t.userName||'—'}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">${t.userEmail||''}</div>
            </td>
            <td data-label="Coins" style="font-family:var(--font-display);color:var(--error)">${formatCoins(t.coins)}</td>
            <td data-label="USD Value" style="color:var(--success);font-weight:700">${formatUSD(t.usdAmount)}</td>
            <td data-label="Send USDT to">
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-family:var(--font-mono);font-size:0.75rem;color:var(--gold)" title="${t.usdtAddress||''}">${truncateAddress(t.usdtAddress||'—')}</span>
                ${t.usdtAddress ? `<button class="btn btn-secondary btn-sm" style="padding:3px 8px;font-size:0.7rem" onclick="copyAddr('${t.usdtAddress}')">📋 Copy</button>` : ''}
              </div>
            </td>
            <td data-label="Date" style="font-size:0.8rem;color:var(--text-muted)">${formatDateTime(t.createdAt)}</td>
            <td data-label="Status">${statusBadge(t.status)}</td>
            <td data-label="Actions">
              ${isPending ? `
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  <button class="btn btn-success btn-sm" onclick="handleApprove('${id}')">✅ Approve</button>
                  <button class="btn btn-danger btn-sm"  onclick="handleReject('${id}')">❌ Reject</button>
                </div>` : `<span style="color:var(--text-muted);font-size:0.8rem">${t.notes||'Processed'}</span>`}
            </td>
          </tr>`;
        }).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" style="color:var(--error);text-align:center;padding:20px">Error: ${err.message}</td></tr>`;
      }
    }

    window.copyAddr = (addr) => {
      navigator.clipboard.writeText(addr).then(() => showToast('Address copied! Send ' + addr, 'success', 'Copied', 5000));
    };

    window.handleApprove = (id) => {
      showConfirm('Have you already sent the USDT payment? Click Confirm to deduct coins and mark as completed.', async () => {
        showSpinner();
        try {
          await approveSellBack(id);
          hideSpinner();
          showToast('Sell-back approved! Coins deducted. ✅', 'success');
          await loadSells();
        } catch (err) {
          hideSpinner();
          showToast('Error: ' + err.message, 'error');
        }
      });
    };

    window.handleReject = (id) => {
      showConfirm('Reject this sell-back request?', async () => {
        showSpinner();
        try {
          await rejectTransaction(id, 'Rejected by admin');
          hideSpinner();
          showToast('Sell request rejected', 'warning');
          await loadSells();
        } catch (err) {
          hideSpinner();
          showToast('Error: ' + err.message, 'error');
        }
      });
    };

    document.getElementById('status-filter').addEventListener('change', loadSells);
    document.getElementById('refresh-btn').addEventListener('click', loadSells);
  </script>
</body>
</html>
